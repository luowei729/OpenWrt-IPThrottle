name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PACKAGE_NAME: ipthrottle

jobs:
  build:
    name: Build ${{ matrix.pkg_format }} (${{ matrix.openwrt_version }})
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # OpenWrt 23.05.0：输出 .ipk 格式（opkg 包管理器）
          - arch: 'x86_64'
            openwrt_version: '23.05.0'
            sdk_version: '23.05.0'
            pkg_format: 'ipk'
            sdk_compress: 'tar.xz'
          
          # OpenWrt 24.10.0：输出 .ipk 格式（opkg 包管理器）
          - arch: 'x86_64'
            openwrt_version: '24.10.0'
            sdk_version: '24.10.0'
            pkg_format: 'ipk'
            sdk_compress: 'tar.zst'
          
          # OpenWrt 25.12.0 (实际下载 SNAPSHOT SDK)：输出 .apk 格式（apk 包管理器）
          # sdk_version 控制实际下载的 SDK 版本，openwrt_version 用于产物命名
          - arch: 'x86_64'
            openwrt_version: '25.12.0'
            sdk_version: 'SNAPSHOT'
            pkg_format: 'apk'
            sdk_compress: 'tar.zst'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: ipthrottle

      - name: Install Prerequisites
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang flex bison g++ gawk \
            gcc-multilib g++-multilib \
            gettext git libncurses5-dev \
            libssl-dev \
            python3-setuptools \
            rsync unzip wget zlib1g-dev \
            file ecj fakeroot \
            zstd
          echo "✅ 基础依赖已安装"

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          # 缓存 key 使用 sdk_version（SNAPSHOT 会命中已有缓存）
          key: openwrt-sdk-${{ matrix.sdk_version }}-${{ matrix.arch }}-v4

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -e
          # ============================================================
          # 下载 OpenWrt SDK
          # - releases 版本路径: releases/VER/targets/x86/64/
          # - snapshots 路径:    snapshots/targets/x86/64/
          # - sdk_version 控制实际下载哪个 SDK
          # ============================================================
          
          COMPRESS="${{ matrix.sdk_compress }}"
          SDK_VER="${{ matrix.sdk_version }}"
          
          # 根据 sdk_version 确定基础 URL
          if [ "$SDK_VER" = "SNAPSHOT" ]; then
            SDK_PAGE="https://downloads.openwrt.org/snapshots/targets/x86/64/"
            SDK_PREFIX="openwrt-sdk-x86-64"
          else
            SDK_PAGE="https://downloads.openwrt.org/releases/${SDK_VER}/targets/x86/64/"
            SDK_PREFIX="openwrt-sdk-${SDK_VER}-x86-64"
          fi
          
          echo "SDK page: $SDK_PAGE"
          echo "SDK prefix: $SDK_PREFIX"
          
          # 提取 SDK 文件名（适配 .tar.xz 和 .tar.zst 两种格式）
          SDK_FILE=$(curl -sL "$SDK_PAGE" | grep -oP "${SDK_PREFIX}_[^\"<>]*\.tar\.(xz|zst)" | head -1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Failed to find SDK file matching prefix: $SDK_PREFIX"
            echo "Page content (first 2000 chars):"
            curl -sL "$SDK_PAGE" | head -c 2000
            exit 1
          fi
          
          SDK_URL="${SDK_PAGE}${SDK_FILE}"
          echo "Downloading SDK: $SDK_URL"
          
          # 下载 SDK 压缩包（使用 wget 支持断点续传）
          wget -q --timeout=600 --tries=3 "$SDK_URL" -O openwrt-sdk.tar
          
          # 根据压缩格式选择解压方式
          case "$COMPRESS" in
            "tar.xz")
              tar -xf openwrt-sdk.tar
              ;;
            "tar.zst")
              tar --use-compress-program=unzstd -xf openwrt-sdk.tar
              ;;
            *)
              echo "ERROR: Unsupported compress format: $COMPRESS"
              exit 1
              ;;
          esac
          
          mv openwrt-sdk-* openwrt-sdk
          rm -f openwrt-sdk.tar
          echo "✅ SDK downloaded and extracted successfully"

      - name: Build usign (Signing Tool)
        run: |
          set -e
          # ============================================================
          # 编译 usign 签名工具（OpenWrt 包签名必需）
          # ============================================================
          cd /tmp
          if [ ! -d usign ]; then
            git clone --depth 1 https://git.openwrt.org/project/usign.git
          fi
          cd usign
          if [ ! -d build ]; then
            mkdir build
          fi
          cd build
          cmake .. && make -j$(nproc)
          
          # 复制到全局路径
          sudo cp usign /usr/local/bin/usign
          echo "✅ usign 已安装"

      - name: Prepare SDK Environment
        run: |
          set -e
          cd openwrt-sdk
          
          # Update feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 配置 SDK
          # CONFIG_SIGNED_PACKAGES=y 启用签名
          # 包格式（ipk/apk）由 SDK 版本自动决定，无需手动配置
          cat > .config << EOF
          CONFIG_PACKAGE_ipthrottle=m
          CONFIG_SIGNED_PACKAGES=y
          CONFIG_SIGNATURE_CHECK=n
          EOF
          
          echo "✅ .config 已生成，启用签名"
          make defconfig

      - name: Restore Signing Key
        env:
          OPENWRT_SIGN_KEY: ${{ secrets.OPENWRT_SIGN_KEY }}
          OPENWRT_RSA_PRIVATE_KEY: ${{ secrets.OPENWRT_RSA_PRIVATE_KEY }}
          OPENWRT_RSA_PUBLIC_KEY: ${{ secrets.OPENWRT_RSA_PUBLIC_KEY }}
          PKG_FORMAT: "${{ matrix.pkg_format }}"
        run: |
          set -e
          # ============================================================
          # 恢复签名密钥
          # - ipk: 使用 usign 密钥（ed25519），存储在 key-build/key-build.ucert
          # - apk: 使用 RSA 密钥，存储在 private-key.pem/public-key.pem
          # 持久化密钥：每次构建使用相同的密钥，避免设备每次都需要重新导入
          # ============================================================
          
          if [ -z "$OPENWRT_SIGN_KEY" ]; then
            echo "ERROR: OPENWRT_SIGN_KEY secret 为空！请在 GitHub Secrets 中配置"
            exit 1
          fi
          
          echo "📦 包格式: $PKG_FORMAT"
          
          # 所有格式都需要 usign 密钥（用于构建索引签名）
          printf "%s" "$OPENWRT_SIGN_KEY" > openwrt-sdk/key-build
          [ -n "$(tail -c1 openwrt-sdk/key-build)" ] && echo "" >> openwrt-sdk/key-build
          chmod 600 openwrt-sdk/key-build
          echo "✅ 签名私钥已恢复到 openwrt-sdk/key-build (usign)"
          
          # apk 格式需要 RSA 密钥
          if [ "$PKG_FORMAT" = "apk" ]; then
            if [ -z "$OPENWRT_RSA_PRIVATE_KEY" ]; then
              echo "ERROR: OPENWRT_RSA_PRIVATE_KEY secret 为空！请在 GitHub Secrets 中配置 RSA 私钥"
              exit 1
            fi
            printf "%s\n" "$OPENWRT_RSA_PRIVATE_KEY" > openwrt-sdk/private-key.pem
            chmod 600 openwrt-sdk/private-key.pem
            echo "✅ RSA 私钥已恢复到 openwrt-sdk/private-key.pem (apk 签名)"
            
            if [ -n "$OPENWRT_RSA_PUBLIC_KEY" ]; then
              printf "%s\n" "$OPENWRT_RSA_PUBLIC_KEY" > openwrt-sdk/public-key.pem
              chmod 644 openwrt-sdk/public-key.pem
              echo "✅ RSA 公钥已恢复到 openwrt-sdk/public-key.pem (apk 验证)"
            fi
          fi

      - name: Copy source code
        run: |
          set -e
          # 将源码文件复制到 SDK package 目录
          mkdir -p openwrt-sdk/package/ipthrottle
          cp -r ipthrottle/files openwrt-sdk/package/ipthrottle/
          cp -r ipthrottle/root openwrt-sdk/package/ipthrottle/
          cp ipthrottle/Makefile openwrt-sdk/package/ipthrottle/
          echo "✅ 源码已复制到 openwrt-sdk/package/ipthrottle/"

      - name: Build Package
        run: |
          set -e
          cd openwrt-sdk
          make package/ipthrottle/compile V=s
          echo "✅ 包编译完成"

      - name: Collect Package Files
        run: |
          set -e
          PKG_FORMAT="${{ matrix.pkg_format }}"
          ARCH="${{ matrix.arch }}"
          VERSION="${{ matrix.openwrt_version }}"
          
          # 查找包文件
          PKG_FILE=$(find openwrt-sdk/bin/packages/ -name "ipthrottle*.$PKG_FORMAT" -type f | head -1)
          if [ -z "$PKG_FILE" ]; then
            echo "❌ 未找到包文件"
            exit 1
          fi
          
          # 重命名为带架构名的简洁格式
          # 例如: ipthrottle-x86_64-23.05.0.ipk
          if [ "$PKG_FORMAT" = "ipk" ]; then
            TARGET_NAME="ipthrottle-${ARCH}-${VERSION}.ipk"
          else
            TARGET_NAME="ipthrottle-${ARCH}-${VERSION}.apk"
          fi
          
          cp "$PKG_FILE" "$TARGET_NAME"
          echo "✅ 产物文件: $TARGET_NAME"
          ls -lh "$TARGET_NAME"
          
          # 收集签名文件（可选）
          for sig_file in Packages.sig Packages.json.sig index.json.sig; do
            find openwrt-sdk/bin/packages/ -name "$sig_file" -exec cp {} . \; 2>/dev/null || true
          done
          
          # 根据包格式收集对应的公钥
          if [ "$PKG_FORMAT" = "ipk" ]; then
            if [ -f openwrt-sdk/key-build.ucert ]; then
              cp openwrt-sdk/key-build.ucert key-build.ucert
              echo "✅ 收集 usign 公钥"
            fi
          elif [ "$PKG_FORMAT" = "apk" ]; then
            if [ -f openwrt-sdk/public-key.pem ]; then
              cp openwrt-sdk/public-key.pem public-key.pem
              echo "✅ 收集 RSA 公钥"
            fi
          fi

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARGET_NAME }}
          path: ${{ env.TARGET_NAME }}
          retention-days: 30
        env:
          TARGET_NAME: ipthrottle-${{ matrix.arch }}-${{ matrix.openwrt_version }}.${{ matrix.pkg_format }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-files/**/*.ipk
            release-files/**/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Validate Package Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Shell Script Syntax Check
        run: |
          set -e
          echo "Checking shell script syntax..."
          for script in files/usr/lib/ipthrottle/*.sh files/usr/sbin/ipthrottle files/etc/init.d/ipthrottle; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              bash -n "$script" || {
                echo "Syntax error in $script"
                exit 1
              }
            fi
          done
          echo "✓ All shell scripts passed syntax check"

      - name: Validate JSON Files
        run: |
          set -e
          echo "Validating JSON files..."
          for json in root/usr/share/luci/menu.d/*.json root/usr/share/rpcd/acl.d/*.json; do
            if [ -f "$json" ]; then
              echo "Checking: $json"
              python3 -m json.tool "$json" > /dev/null || {
                echo "Invalid JSON: $json"
                exit 1
              }
            fi
          done
          echo "✓ All JSON files are valid"

      - name: Check File Structure
        run: |
          set -e
          echo "Verifying package structure..."
          
          required_files=(
            "Makefile"
            "files/usr/lib/ipthrottle/core.sh"
            "files/usr/lib/ipthrottle/ip.sh"
            "files/usr/lib/ipthrottle/wan.sh"
            "files/usr/lib/ipthrottle/schedule.sh"
            "files/etc/config/ipthrottle"
            "files/etc/init.d/ipthrottle"
            "files/usr/sbin/ipthrottle"
            "root/usr/share/luci/menu.d/luci-app-ipthrottle.json"
            "root/www/luci-static/resources/view/ipthrottle.js"
          )
          
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done
          
          echo "✓ Package structure is complete"

      - name: Check UCI Config Format
        run: |
          set -e
          echo "Validating UCI configuration..."
          
          if ! grep -q "config ipthrottle" files/etc/config/ipthrottle; then
            echo "Missing 'config ipthrottle' section"
            exit 1
          fi
          
          echo "✓ UCI configuration is valid"
